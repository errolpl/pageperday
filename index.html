<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>How Many Pages Per Day?</title>
  </head>
  <body>
    <div class="wrapper">
      <h1>How Many Pages Per Day to Finish Before Meeting?</h1>
      <h2 id="meeting-date">Next Meeting</h2>
      <h2 id="days-left">Days Left Till Meeting</h2>
      <h2 id="pagecount">Page Count</h2>
      <h2 id="pages-left">Pages Left</h2>
      <h2 id="ppd">Pages Per Day</h2>
      <label for="currentpage">Current Page:</label>
      <input type="number" id="currentpage" name="currentpage" />
      <button onclick="calculatePPD()">Calculate Pages Per Day</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
